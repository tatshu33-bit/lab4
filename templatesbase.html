<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжковий магазин{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- Навігаційне меню -->
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <a href="/" class="text-2xl font-bold">BookStore</a>
                
                <!-- Мобільне меню -->
                <div class="md:hidden">
                    <button id="mobile-menu-button" class="text-white focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>

                <!-- Десктопне меню -->
                <div class="hidden md:flex space-x-6">
                    <a href="/" class="hover:text-blue-200 transition duration-300">Головна</a>
                    <a href="/about" class="hover:text-blue-200 transition duration-300">Про нас</a>
                    <a href="/catalog" class="hover:text-blue-200 transition duration-300">Каталог</a>
                    <a href="/contact" class="hover:text-blue-200 transition duration-300">Контакти</a>
                </div>
            </div>

            <!-- Мобільне меню (сховане за замовчуванням) -->
            <div id="mobile-menu" class="hidden md:hidden pb-4">
                <a href="/" class="block py-2 hover:text-blue-200">Головна</a>
                <a href="/about" class="block py-2 hover:text-blue-200">Про нас</a>
                <a href="/catalog" class="block py-2 hover:text-blue-200">Каталог</a>
                <a href="/contact" class="block py-2 hover:text-blue-200">Контакти</a>
            </div>
        </div>
    </nav>

    <!-- Основний контент -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Футер -->
    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2024 Книжковий магазин BookStore. Всі права захищені.</p>
            <div class="mt-4 space-x-4">
                <a href="/" class="hover:text-blue-300">Головна</a>
                <a href="/about" class="hover:text-blue-300">Про нас</a>
                <a href="/catalog" class="hover:text-blue-300">Каталог</a>
                <a href="/contact" class="hover:text-blue-300">Контакти</a>
            </div>
        </div>
    </footer>

    <!-- JavaScript для мобільного меню -->
    <script>
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
