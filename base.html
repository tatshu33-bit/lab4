<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжковий магазин{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <a href="/" class="text-2xl font-bold">BookStore</a>
                <div class="flex space-x-6">
                    <a href="/" class="hover:text-blue-200">Головна</a>
                    <a href="/about" class="hover:text-blue-200">Про нас</a>
                    <a href="/catalog" class="hover:text-blue-200">Каталог</a>
                    <a href="/contact" class="hover:text-blue-200">Контакти</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
